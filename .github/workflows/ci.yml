name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Pure language extension: CI checks that the committed generated parser
# matches grammar.js and that the corpus tests pass, on both Linux and
# macOS (the tree-sitter CLI compiles the parser + scanner natively for
# the tests, so this also exercises the C scanner on both platforms).
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true

      - name: Generate-check and corpus tests
        run: pixi run ci
