[workspace]
authors = ["Kolen Cheung <10970208+ickc@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "zed-taskpaper"
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]
version = "0.3.2"

[dependencies]
bash = "*"
tree-sitter-cli = ">=0.25"
c-compiler = "*"

# Rust comes from the system rustup (~/.rustup, ~/.cargo). Pin the toolchain
# via env var instead of mutating the user's `rustup default`, and make sure
# cargo is on PATH even when the invoking shell didn't source cargo's env.
[activation.env]
RUSTUP_TOOLCHAIN = "stable"
PATH = "$HOME/.cargo/bin:$PATH"

[tasks]
# --- grammar ---------------------------------------------------------------
# Regenerate src/parser.c & friends from grammar.js. Generated sources are
# committed because Zed builds the grammar from the repo as-is.
generate = { cmd = "tree-sitter generate", cwd = "tree-sitter-taskpaper" }

# Fail if grammar.js and the committed generated parser are out of sync.
generate-check = { cmd = "git diff --exit-code -- tree-sitter-taskpaper/src", depends-on = ["generate"] }

# Corpus tests under tree-sitter-taskpaper/test/corpus.
test = { cmd = "tree-sitter test", cwd = "tree-sitter-taskpaper" }

# Parse an example file and show the tree (handy while hacking on the grammar).
parse = { cmd = "tree-sitter parse ../examples/demo.taskpaper", cwd = "tree-sitter-taskpaper" }

# --- language server + extension WASM ---------------------------------------
# Idempotent check/install of the stable toolchain + wasm32-wasip1 target
# (required by Zed extensions) through the system rustup.
bootstrap-rust = "bash scripts/bootstrap-rust.sh"

# The taskpaper-ls language server (native binary).
build-lsp = { cmd = "cargo build --release --package taskpaper-ls", depends-on = ["bootstrap-rust"] }

# The Zed extension itself (WASM). Zed rebuilds this on "Install Dev
# Extension"; this task exists to catch compile errors locally/in CI.
build-wasm = { cmd = "cargo build --release --target wasm32-wasip1 --package zed-taskpaper", depends-on = ["bootstrap-rust"] }

build = { depends-on = ["build-lsp", "build-wasm"] }

test-rust = { cmd = "cargo test --workspace", depends-on = ["bootstrap-rust"] }
fmt = { cmd = "cargo fmt --all", depends-on = ["bootstrap-rust"] }
lint = { cmd = "cargo fmt --all --check && cargo clippy --workspace --all-targets -- -D warnings", depends-on = ["bootstrap-rust"] }

ci = { depends-on = ["generate-check", "test", "lint", "test-rust", "build"] }
